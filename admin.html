</button>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Kelola Berita</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        #editor { height: 300px; margin-bottom: 20px; }
        .btn-save { background: #4A90E2; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .logout-btn { float: right; background: #ff4d4d; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="#" onclick="logout()" class="logout-btn">Logout</a>
        <h2>Tambah Berita Baru</h2>
        <hr><br>
        
        <div class="form-group">
            <label>Judul Berita</label>
            <input type="text" id="judul" placeholder="Masukkan judul menarik...">
        </div>

        <div class="form-group">
            <label>URL Gambar (Link Foto)</label>
            <input type="text" id="gambar" placeholder="https://link-foto.com/gambar.jpg">
        </div>

        <div class="form-group">
            <label>Isi Berita (Editor ala Word)</label>
            <div id="editor"></div>
        </div>

        <button class="btn-save" onclick="simpanBerita()">Publikasikan Berita</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const SUPABASE_URL = 'https://jtlojyrfwccqebfowlof.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_miw4K1jRQJTEdm1P2sOH-w_kVV6BSBd';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Inisialisasi Editor ala Word (Quill)
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: { toolbar: [['bold', 'italic', 'underline'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['link', 'clean']] }
        });

        // Proteksi Halaman (Cek Login)
        async function proteksiHalaman() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = "login.html";
        }
        proteksiHalaman();

        async function simpanBerita() {
            const judul = document.getElementById('judul').value;
            const gambar = document.getElementById('gambar').value;
            const konten = quill.root.innerHTML; // Mengambil konten HTML dari editor
            const slug = judul.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const tanggal = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });

            const { error } = await supabaseClient.from('berita').insert([
                { judul, gambar, isi: konten, slug, tanggal, konten_lengkap: konten }
            ]);

            if (error) {
                alert("Gagal: " + error.message);
            } else {
                alert("Berita Berhasil Terbit!");
                location.reload();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
