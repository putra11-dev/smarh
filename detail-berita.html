.article-meta {

    border-bottom: 1px solid #eee;

    display: flex;

    gap: 10px;
}

/* Tata Letak Dua Kolom */
.main-content-wrapper {
    display: grid;
    grid-template-columns: 2fr 1fr; /* Kiri lebih lebar dari kanan */
    gap: 40px;
}

/* Ukuran Foto Detail agar tidak terlalu besar */
.image-container {
    width: 100%;
    max-width: 700px; /* Batas lebar maksimal foto */
    margin-bottom: 25px;
}

.featured-image {
    width: 100%;
    height: 400px; /* Tinggi tetap agar rapi */
    object-fit: cover; /* Foto dipotong otomatis agar tidak gepeng */
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Sidebar Styling */
.sidebar {
    background: #f9f9f9;
    padding: 20px;
    border-radius: 15px;
    height: fit-content;
    position: sticky; /* Menempel saat di-scroll */
    top: 100px;
}

.sidebar-title {
    font-size: 1.2rem;

    padding-bottom: 10px;
    border-bottom: 2px solid #4A90E2;
}

.sidebar-item {
    display: flex;

    margin-bottom: 15px;
    text-decoration: none;
    color: #333;
    transition: 0.3s;
}

.sidebar-item:hover {
    color: #4A90E2;
}

.sidebar-item img {
    width: 80px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
}

.sidebar-item h4 {

}

/* Responsive: Jika layar HP, jadikan satu kolom */
@media (max-width: 992px) {
    .main-content-wrapper {
        grid-template-columns: 1fr;
    }
}
    </style>

<script>
// 2. Inisialisasi Client di awal agar bisa diakses semua fungsi
const SUPABASE_URL = 'https://jtlojyrfwccqebfowlof.supabase.co';
const SUPABASE_KEY = 'sb_publishable_miw4K1jRQJTEdm1P2sOH-w_kVV6BSBd';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const beritaSlug = params.get('id');

async function loadDetailAndSidebar() {
    if (!beritaSlug) return;

    try {
        // AMBIL DATA BERITA UTAMA
        const { data: berita, error: errorBerita } = await supabaseClient
            .from('berita')
            .select('*')
            .eq('slug', beritaSlug)
            .single();

        if (errorBerita || !berita) throw new Error("Berita tidak ditemukan");

        // Isi konten utama
        document.querySelector('.article-title').innerText = berita.judul;
        document.querySelector('.featured-image').src = berita.gambar;
        document.querySelector('.article-meta').innerHTML = 
            `<i class="fas fa-calendar"></i> ${berita.tanggal} | <i class="fas fa-newspaper"></i> SMA RH`;
        document.querySelector('.article-body').innerHTML = `<p>${berita.konten_lengkap || berita.isi}</p>`;

        // --- BAGIAN SIDEBAR (BERITA TERBARU) ---
        const { data: sidebarData, error: errorSidebar } = await supabaseClient
            .from('berita')
            .select('slug, judul, gambar, tanggal')
            .not('slug', 'eq', beritaSlug) // Jangan tampilkan berita yang sedang dibaca
            .order('id', { ascending: false }) // Urutkan dari yang terbaru
            .limit(5);

        const sidebarList = document.getElementById('sidebar-news-list');
        
        if (sidebarList && sidebarData) {
            sidebarList.innerHTML = ''; // Kosongkan loading/isi lama
            sidebarData.forEach(item => {
                sidebarList.innerHTML += `
                    <a href="detail-berita.html?id=${item.slug}" class="sidebar-item">
                        <img src="${item.gambar}" alt="${item.judul}" onerror="this.src='poto/default.jpg'">
                        <div>
                            <h4>${item.judul}</h4>
                            <small style="color: #888;">${item.tanggal}</small>
                        </div>
                    </a>
                `;
            });
        }
    } catch (e) {
        console.error("Error Sidebar/Detail:", e.message);
        if (document.querySelector('.article-body')) {
            document.querySelector('.article-body').innerHTML = "<p>Gagal memuat data berita.</p>";
        }
    }
}

// Jalankan fungsi saat halaman siap
document.addEventListener('DOMContentLoaded', loadDetailAndSidebar);
</script>
